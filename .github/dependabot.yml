version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dotnet-libraries-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      dotnet-libraries-major:
        update-types:
          - "major"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      github-actions-major:
        update-types:
          - "major"
        patterns:
          - "*"

