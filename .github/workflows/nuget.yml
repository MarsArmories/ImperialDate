name: Build, Test, and Publish Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  SOLUTION_PATH: src/MarsArmories.ImperialDate.slnx
  PROJECT_PATH: src/MarsArmories.ImperialDate/MarsArmories.ImperialDate.csproj

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore "${SOLUTION_PATH}"

    - name: Build
      run: dotnet build "${SOLUTION_PATH}" --configuration Release --no-restore

    - name: Test
      run: dotnet test "${SOLUTION_PATH}" --configuration Release --no-build --verbosity normal

    - name: Resolve package version
      id: package_version
      shell: bash
      run: |
        BASE_VERSION="$(dotnet msbuild "${PROJECT_PATH}" -nologo -getProperty:PackageVersion)"
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          FINAL_VERSION="${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}"
        else
          FINAL_VERSION="${BASE_VERSION}"
        fi

        echo "value=${FINAL_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Packaging with version ${FINAL_VERSION}"

    - name: Pack
      run: dotnet pack "${PROJECT_PATH}" --configuration Release --no-build --output artifacts /p:PackageVersion=${{ steps.package_version.outputs.value }}

    - name: Publish to NuGet.org
      if: ${{ secrets.NUGET_API_KEY != '' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
      shell: bash
      run: |
        shopt -s nullglob
        for package in artifacts/*.nupkg artifacts/*.snupkg; do
          dotnet nuget push "$package" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
        done

    - name: Publish to GitHub Packages
      if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        shopt -s nullglob
        for package in artifacts/*.nupkg; do
          dotnet nuget push "$package" --api-key "${GITHUB_TOKEN}" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
        done
